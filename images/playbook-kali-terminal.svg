<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Where to type commands in Kali</title>
  <desc id="desc">A browser window with Kali desktop and a highlighted terminal where lab commands are entered.</desc>
  <rect width="1200" height="680" fill="#f7f9fc"/>
  <style>
    .title{font:700 34px Arial,Helvetica,sans-serif;fill:#172033}
    .sub{font:500 16px Arial,Helvetica,sans-serif;fill:#5a6678}
    .chrome{fill:#ffffff;stroke:#ccd6e6;stroke-width:2;rx:14}
    .bar{fill:#e9eef7}
    .desktop{fill:#1e2a38}
    .term{fill:#0b1020;stroke:#64d27e;stroke-width:5;rx:8}
    .txt{font:600 16px Menlo,Consolas,monospace;fill:#d7f8df}
    .label{font:700 18px Arial,Helvetica,sans-serif;fill:#172033}
    .call{fill:#e9f8ef;stroke:#64d27e;stroke-width:2;rx:10}
    .arrow{stroke:#64d27e;stroke-width:4;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64d27e"/>
    </marker>
  </defs>
  <text x="52" y="58" class="title">Kali: commands go in the Terminal window</text>
  <text x="54" y="88" class="sub">Open http://localhost:6088, then open Terminal inside the Kali desktop.</text>

  <rect x="72" y="124" width="1056" height="488" class="chrome"/>
  <rect x="72" y="124" width="1056" height="46" class="bar" rx="14"/>
  <circle cx="104" cy="147" r="7" fill="#ff6b6b"/>
  <circle cx="128" cy="147" r="7" fill="#ffd166"/>
  <circle cx="152" cy="147" r="7" fill="#06d6a0"/>
  <rect x="188" y="136" width="360" height="22" fill="#fff" stroke="#d0d8e6" rx="11"/>
  <text x="204" y="153" font-family="Menlo,Consolas,monospace" font-size="13" fill="#536072">http://localhost:6088</text>
  <rect x="92" y="190" width="1016" height="398" class="desktop"/>

  <rect x="168" y="258" width="706" height="260" class="term"/>
  <rect x="168" y="258" width="706" height="34" fill="#141b2d" rx="8"/>
  <text x="188" y="281" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#edf2ff">kali@kali: ~</text>
  <text x="194" y="330" class="txt">$ ip route</text>
  <text x="194" y="364" class="txt">$ nmap -sT -sV -p 502 192.168.95.10-15</text>
  <text x="194" y="398" class="txt">$ python3 - &lt;&lt;'PY'</text>
  <text x="194" y="432" class="txt"># paste Modbus read/write commands here</text>
  <text x="194" y="466" class="txt">PY</text>

  <rect x="878" y="300" width="190" height="112" class="call"/>
  <text x="900" y="334" class="label">Type here</text>
  <text x="900" y="362" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#536072">This is where the</text>
  <text x="900" y="382" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#536072">playbook commands go.</text>
  <line x1="878" y1="356" x2="820" y2="356" class="arrow"/>
</svg>
